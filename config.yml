# Configuration file for the application

server:
  port: 8080
  host: "0.0.0.0"

database:
  host: "localhost"
  port: 5432
  user: "dbuser"
  password: "dbpassword"
  name: "dbname"

logging:
  level: "info"
  format: "json"

auth:
  jwt_secret: "your_jwt_secret"
  token_expiry: "24h"

payments:
  paystack:


pubsub:
  provider: "your_pubsub_provider"
  topic: "your_topic_name"

subscriptions:
  max_retries: 3
