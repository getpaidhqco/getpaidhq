name: getpaidhq

services:
  postgresql:
    container_name: getpaidhq-postgresql
    command:
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_wal_senders=10"
      - "-c"
      - "max_replication_slots=10"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: getpaidhq
    image: postgres:17
    networks:
      - payloop-network
    # Host port 6432 is mapped to the container's 5432 to avoid clashing with
    # other local Postgres containers running on the default port.
    ports:
      - "6432:5432"
    volumes:
      - getpaidhq-pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  hatchet-lite:
    # All-in-one Hatchet (engine + API + UI) for local development.
    # Shares the postgresql service above — uses its own `hatchet` database.
    # First-boot bootstrap (register, create tenant, issue token) lives in CLAUDE.md.
    container_name: hatchet-lite
    depends_on:
      postgresql:
        condition: service_healthy
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgresql:5432/hatchet?sslmode=disable"
      # gRPC default port is 7070 and default bind is 127.0.0.1 (loopback inside
      # the container). Override both so the gRPC server is reachable from the
      # host on the same port the broadcast address and client config use.
      SERVER_GRPC_PORT: "7077"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: "localhost:7077"
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_AUTH_COOKIE_DOMAIN: "localhost"
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_AUTH_COOKIE_SECRETS: "secret1 secret2"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
      SERVER_URL: "http://localhost:8888"
    networks:
      - payloop-network
    ports:
      - "8888:8888"
      - "7077:7077"
    # Persist auto-generated encryption keys + server config across container
    # recreations so admin-issued tokens stay valid (entrypoint quickstart runs
    # with --overwrite=false and skips regeneration if /config exists).
    volumes:
      - hatchet-config:/config

networks:
  payloop-network:
    driver: bridge
    name: payloop-network

volumes:
  getpaidhq-pgdata:
  hatchet-config:
