name: getpaidhq

services:
  postgresql:
    container_name: getpaidhq-postgresql
    environment:
      POSTGRES_USER: getpaidhq
      POSTGRES_PASSWORD: getpaidhq
      POSTGRES_DB: getpaidhq
    image: postgres:17
    networks:
      - getpaidhq-network
    # Host ports remapped into the 10xxx band to avoid clashing with anything
    # else running locally. Loopback-bound (127.0.0.1) so the trivial dev
    # creds aren't reachable from your LAN.
    ports:
      - "127.0.0.1:10432:5432"
    volumes:
      - getpaidhq-pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U getpaidhq"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    # External NATS broker the app's pubsub adapter connects to (NATS_URL).
    # 4222 = client port, 8222 = HTTP monitoring (used for the healthcheck).
    container_name: getpaidhq-nats
    image: nats:2.10-alpine
    command: ["--http_port", "8222"]
    networks:
      - getpaidhq-network
    ports:
      - "127.0.0.1:10422:4222"
      - "127.0.0.1:10822:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    # Redis backing the cache adapter (REDIS_HOST) and the distributed,
    # cluster-wide rate limiter (redis_rate GCRA). Data is ephemeral — both
    # uses tolerate a cold start, so no volume is mounted.
    container_name: getpaidhq-redis
    image: redis:7-alpine
    networks:
      - getpaidhq-network
    ports:
      - "127.0.0.1:10379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  hatchet-lite:
    # All-in-one Hatchet (engine + API + UI) for local development.
    # Shares the postgresql service above — uses its own `hatchet` database.
    # First-boot bootstrap (register, create tenant, issue token) lives in CLAUDE.md.
    container_name: hatchet-lite
    depends_on:
      postgresql:
        condition: service_healthy
    image: ghcr.io/hatchet-dev/hatchet/hatchet-lite:latest
    environment:
      DATABASE_URL: "postgresql://getpaidhq:getpaidhq@postgresql:5432/hatchet?sslmode=disable"
      # gRPC default port is 7070 and default bind is 127.0.0.1 (loopback inside
      # the container). Override both so the gRPC server is reachable from the
      # host on the same port the broadcast address and client config use. The
      # broadcast address must match the *host* port the SDK dials, because
      # Hatchet hands it back to the client after the initial handshake.
      SERVER_GRPC_PORT: "7077"
      SERVER_GRPC_BIND_ADDRESS: "0.0.0.0"
      SERVER_GRPC_INSECURE: "t"
      SERVER_GRPC_BROADCAST_ADDRESS: "localhost:10707"
      SERVER_AUTH_SET_EMAIL_VERIFIED: "t"
      SERVER_AUTH_COOKIE_DOMAIN: "localhost"
      SERVER_AUTH_COOKIE_INSECURE: "t"
      SERVER_AUTH_COOKIE_SECRETS: "secret1 secret2"
      SERVER_DEFAULT_ENGINE_VERSION: "V1"
      SERVER_URL: "http://localhost:10888"
    networks:
      - getpaidhq-network
    ports:
      - "127.0.0.1:10888:8888"
      - "127.0.0.1:10707:7077"
    # Persist auto-generated encryption keys + server config across container
    # recreations so admin-issued tokens stay valid (entrypoint quickstart runs
    # with --overwrite=false and skips regeneration if /config exists).
    volumes:
      - hatchet-config:/config

networks:
  getpaidhq-network:
    driver: bridge
    name: getpaidhq-network

volumes:
  getpaidhq-pgdata:
  hatchet-config:
