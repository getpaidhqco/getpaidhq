info:
  description: "\nThis is the autogenerated OpenAPI documentation for your [Fuego](https://github.com/go-fuego/fuego)
    API.\n\nBelow is a Fuego Cheatsheet to help you get started. Don't hesitate to
    check the [Fuego documentation](https://go-fuego.dev) for more details.\n\nHappy
    coding! \U0001F525\n\n## Usage\n\n### Route registration\n\n```go\nfunc main()
    {\n\t// Create a new server\n\ts := fuego.NewServer()\n\n\t// Register some routes\n\tfuego.Post(s,
    \"/hello\", myController)\n\tfuego.Get(s, \"/myPath\", otherController)\n\tfuego.Put(s,
    \"/hello\", thirdController)\n\n\tadminRoutes := fuego.Group(s, \"/admin\")\n\tfuego.Use(adminRoutes,
    myMiddleware) // This middleware (for authentication, etc...) will be available
    for routes starting by /admin/*, \n\tfuego.Get(adminRoutes, \"/hello\", groupController)
    // This route will be available at /admin/hello\n\n\t// Start the server\n\ts.Start()\n}\n```\n\n###
    Basic controller\n\n```go\ntype MyBody struct {\n\tName string `json:\"name\"
    validate:\"required,max=30\"`\n}\n\ntype MyResponse struct {\n\tAnswer string
    `json:\"answer\"`\n}\n\nfunc hello(ctx fuego.ContextWithBody[MyBody]) (*MyResponse,
    error) {\n\tbody, err := ctx.Body()\n\tif err != nil {\n\t\treturn nil, err\n\t}\n\n\treturn
    &MyResponse{Answer: \"Hello \" + body.Name}, nil\n}\n```\n\n### Add openAPI information
    to the route\n\n```go\nimport (\n\t\"github.com/go-fuego/fuego\"\n\t\"github.com/go-fuego/fuego/option\"\n\t\"github.com/go-fuego/fuego/param\"\n)\n\nfunc
    main() {\n\ts := fuego.NewServer()\n\n\t// Custom OpenAPI options\n\tfuego.Post(s,
    \"/\", myController\n\t\toption.Description(\"This route does something...\"),\n\t\toption.Summary(\"This
    is my summary\"),\n\t\toption.Tags(\"MyTag\"), // A tag is set by default according
    to the return type (can be deactivated)\n\t\toption.Deprecated(), // Marks the
    route as deprecated in the OpenAPI spec\n\n\t\toption.Query(\"name\", \"Declares
    a query parameter with default value\", param.Default(\"Carmack\")),\n\t\toption.Header(\"Authorization\",
    \"Bearer token\", param.Required()),\n\t\toptionPagination,\n\t\toptionCustomBehavior,\n\t)\n\n\ts.Run()\n}\n\nvar
    optionPagination = option.Group(\n\toption.QueryInt(\"page\", \"Page number\",
    param.Default(1), param.Example(\"1st page\", 1), param.Example(\"42nd page\",
    42)),\n\toption.QueryInt(\"perPage\", \"Number of items per page\"),\n)\n\nvar
    optionCustomBehavior = func(r *fuego.BaseRoute) {\n\tr.XXX = \"YYY\"\n}\n```\n\nThen,
    in the controller\n\n```go\ntype MyResponse struct {\n\tAnswer string `json:\"answer\"`\n}\n\nfunc
    getAllPets(ctx fuego.ContextNoBody) (*MyResponse, error) {\n\tname := ctx.QueryParam(\"name\")\n\tperPage,
    _ := ctx.QueryParamIntErr(\"per_page\")\n\n\treturn &MyResponse{Answer: \"Hello
    \" + name}, nil\n}\n```\n"
